services:
  comfyui:
    image: mmartial/comfyui-nvidia-docker:ubuntu24_cuda12.8-latest
    container_name: comfyui
    ports:
      - "127.0.0.1:8188:8188"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    environment:
      - BASE_DIRECTORY=/basedir
      - WANTED_UID=1000
      - WANTED_GID=1000
      - COMFYUI_ARGS=--fast --use-pytorch-cross-attention

    volumes:
      - ./run:/comfy/mnt
      - ./basedir:/basedir

    restart: unless-stopped
    runtime: nvidia
